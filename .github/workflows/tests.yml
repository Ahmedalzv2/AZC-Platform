name: Tests

# PR + feature-branch validation only. main is intentionally absent: a push
# to main is covered by the `tests` job inside deploy-pages.yml, so testing
# here too would double-run the suite on every merge.
on:
  push:
    branches:
      - 'claude/**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm test

  eval:
    # Strategy-regression gate: backtests SOL,XRP vs tests/baselines/current.json.
    # Non-blocking until the baseline is re-blessed (drift being reconciled);
    # drop continue-on-error to make strategy drift a hard merge gate.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm run eval
