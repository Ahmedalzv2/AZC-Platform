name: Deploy dashboard to GitHub Pages

# Auto-deploys the repo (index.html + assets) to GitHub Pages on every push
# to main, so https://Ahmedalzv2.github.io/AZC-Platform/ always shows latest.
#
# Pipeline: tests -> build -> deploy. Deploy is gated on a green suite, so a
# failing test never reaches production. Only main is wired up because the
# github-pages environment's branch-protection rules reject non-default
# branches ("Branch '<x>' is not allowed to deploy to github-pages").
#
# Uses GitHub's native Pages deployment (upload-pages-artifact + deploy-pages)
# rather than pushing a gh-pages branch — no redundant pages-build-deployment
# runs, and deploy provenance flows through the id-token.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm test

  build:
    needs: [tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Whole repo — served as a static site, no build step.
          path: '.'

  deploy:
    needs: [build]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
